<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пятница!</title>
    <style>
        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
        }
        /* Анимация переливания цвета текста */
        .animated-text {
            font-size: 5rem;
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #ff00ff, #00ffff, #ff007f);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-move 4s ease infinite;
            cursor: pointer;
            user-select: none;
            text-align: center;
        }
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>
    <!-- Подключаем наш единый файл со стилями из папки styles -->
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <!-- Общий контейнер, чтобы ссылка всегда была строго внизу -->
    <div style="text-align: center;">
        
        <!-- Текст, который изменится сам через JavaScript -->
        <div id="dynamic-title" class="animated-text" onclick="playDaySound()">
            Загрузка...
        </div>
        
        <!-- Ссылка на вторую страницу -->
        <a href="page2.html" style="color: white; font-size: 20px; display: inline-block; margin-top: 40px; font-family: verdana; text-decoration: none;">
            Перейти на страницу 2 →
        </a>

    </div>

    <script>
        // 1. Список дней недели в нужном падеже
        const days = [
            "Воскресенье", 
            "Понедельник", 
            "Вторник", 
            "Среду", 
            "Четверг", 
            "Пятницу", 
            "Субботу"
        ];

        // 2. Узнаем текущий день на компьютере пользователя (цифра от 0 до 6)
        const currentDayNumber = new Date().getDay();
        const currentDayName = days[currentDayNumber];

        // 3. Выводим красивый текст на экран
        document.getElementById('dynamic-title').innerText = `Привет Мир ! сука в ${currentDayName}`;

        // 4. Функция включения локального аудиофайла при клике
        function playDaySound() {
            // JavaScript сам подставит цифру дня, например '5.mp3'
            const audioFile = `${currentDayNumber}.mp3`;
            const audio = new Audio(audioFile);
            
            audio.play().catch(error => {
                console.log("Кликните по экрану для запуска звука:", error);
            });
        }
    </script>

</body>
</html>
